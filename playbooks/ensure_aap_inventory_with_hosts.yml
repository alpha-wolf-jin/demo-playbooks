---
- name: "SOP playbook 'ensure_aap_inventory_with_hosts' - Ensures organization, inventory and hosts in AAP"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_gateway_ip: ""
    aap_user: ""
    aap_password: ""
    organization_name: ""
    inventory_name: ""
    hosts_list: ""
    request_timeout: 60
    backup_dir: "/var/log/ai-playbooks-backup/ensure_aap_inventory_with_hosts"

  pre_tasks:
    # ==================== SNAPSHOT (tag: snapshot) ====================
    - name: "Snapshot - Create backup directory"
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'
      tags: snapshot

    - name: "Snapshot - Look up organization existence"
      ansible.builtin.set_fact:
        _snap_org: >-
          {{ query('ansible.controller.controller_api', 'organizations',
                 host='https://' ~ aap_gateway_ip,
                 username=aap_user,
                 password=aap_password,
                 verify_ssl=false,
                 query_params={'name': organization_name},
                 return_all=true) | flatten }}
      tags: snapshot

    - name: "Snapshot - Save organization existence flag"
      ansible.builtin.copy:
        content: "{{ (_snap_org | length > 0) | lower }}"
        dest: "{{ backup_dir }}/org_exists.txt"
      tags: snapshot

    - name: "Snapshot - Look up inventory existence"
      ansible.builtin.set_fact:
        _snap_inv: >-
          {{ query('ansible.controller.controller_api', 'inventories',
                 host='https://' ~ aap_gateway_ip,
                 username=aap_user,
                 password=aap_password,
                 verify_ssl=false,
                 query_params={'name': inventory_name, 'organization__name': organization_name},
                 return_all=true) | flatten }}
      tags: snapshot

    - name: "Snapshot - Save inventory existence flag"
      ansible.builtin.copy:
        content: "{{ (_snap_inv | length > 0) | lower }}"
        dest: "{{ backup_dir }}/inv_exists.txt"
      tags: snapshot

    - name: "Snapshot - Save inventory ID if inventory exists"
      ansible.builtin.copy:
        content: "{{ _snap_inv[0].id | string }}"
        dest: "{{ backup_dir }}/inv_id.txt"
      when: _snap_inv | length > 0
      tags: snapshot

    - name: "Snapshot - Gather original hosts if inventory existed"
      block:
        - name: "Snapshot - Gather original hosts list"
          ansible.builtin.set_fact:
            _snap_hosts: >-
              {{ query('ansible.controller.controller_api', 'hosts',
                     host='https://' ~ aap_gateway_ip,
                     username=aap_user,
                     password=aap_password,
                     verify_ssl=false,
                     query_params={'inventory': _snap_inv[0].id},
                     return_all=true) | flatten | map(attribute='name') | list }}

        - name: "Snapshot - Write original hosts list"
          ansible.builtin.copy:
            content: "{{ _snap_hosts | join(',') }}"
            dest: "{{ backup_dir }}/hosts_original.txt"
      when: _snap_inv | length > 0
      tags: snapshot

  tasks:
    - block:
        # ==================== EXECUTE (tag: execute) ====================
        - name: "Assert required variables are provided"
          ansible.builtin.assert:
            that:
              - aap_gateway_ip | length > 0
              - aap_user | length > 0
              - aap_password | length > 0
              - organization_name | length > 0
              - inventory_name | length > 0
              - hosts_list | length > 0
            fail_msg: "Missing required variables – check aap_gateway_ip, aap_user, aap_password, organization_name, inventory_name, hosts_list"
          tags: execute

        # Prepare desired hosts list (used for verification)
        - name: "Prepare desired hosts list from hosts_list"
          ansible.builtin.set_fact:
            _hosts: "{{ (hosts_list).split(',') | map('trim') | reject('equalto', '') | list }}"
          tags: execute

        # step-01: Look up organization (Req 2)
        - name: "Req 2 - Look up existing organization"
          ansible.builtin.set_fact:
            _existing_org: >-
              {{ query('ansible.controller.controller_api', 'organizations',
                     host='https://' ~ aap_gateway_ip,
                     username=aap_user,
                     password=aap_password,
                     verify_ssl=false,
                     query_params={'name': organization_name},
                     return_all=true) | flatten }}
          tags: execute

        # step-02: Decide (implicit in when below) – org exists if _existing_org has length > 0

        # step-03: Create organization (Req 4)
        - name: "Req 4 - Create the organization"
          ansible.controller.organization:
            name: "{{ organization_name }}"
            state: present
            controller_host: "https://{{ aap_gateway_ip }}"
            controller_username: "{{ aap_user }}"
            controller_password: "{{ aap_password }}"
            validate_certs: false
          register: _org_created
          when: _existing_org | length == 0
          tags: execute

        # step-04: Ensure inventory exists (Req 5) – lookup + create + capture ID
        - name: "Req 5 - Look up existing inventory"
          ansible.builtin.set_fact:
            _existing_inventory: >-
              {{ query('ansible.controller.controller_api', 'inventories',
                     host='https://' ~ aap_gateway_ip,
                     username=aap_user,
                     password=aap_password,
                     verify_ssl=false,
                     query_params={'name': inventory_name, 'organization__name': organization_name},
                     return_all=true) | flatten }}
          tags: execute

        - name: "Req 5 - Create the inventory"
          ansible.controller.inventory:
            name: "{{ inventory_name }}"
            organization: "{{ organization_name }}"
            state: present
            controller_host: "https://{{ aap_gateway_ip }}"
            controller_username: "{{ aap_user }}"
            controller_password: "{{ aap_password }}"
            validate_certs: false
          register: _inv_created
          when: _existing_inventory | length == 0
          tags: execute

        - name: "Req 5 - Set inventory ID fact"
          ansible.builtin.set_fact:
            _inv_id: "{{ _existing_inventory[0].id if (_existing_inventory | length > 0) else _inv_created.id }}"
          tags: execute

        # step-05: Collect hosts already in inventory (Req 6)
        - name: "Req 6 - Collect hosts already in inventory"
          ansible.builtin.set_fact:
            _hosts_raw: >-
              {{ query('ansible.controller.controller_api', 'hosts',
                     host='https://' ~ aap_gateway_ip,
                     username=aap_user,
                     password=aap_password,
                     verify_ssl=false,
                     query_params={'inventory': _inv_id},
                     return_all=true) | flatten }}
          tags: execute

        # step-06: Compute missing hosts (Req 7)
        - name: "Req 7 - Compute missing hosts"
          ansible.builtin.set_fact:
            _existing_host_names: "{{ _hosts_raw | map(attribute='name') | list }}"
            _missing_hosts: "{{ (hosts_list.split(',') | map('trim') | reject('equalto', '') | list) | difference(_existing_host_names) }}"
          tags: execute

        # step-07: Add missing hosts (Req 8)
        - name: "Req 8 - Add missing hosts to the inventory"
          ansible.controller.host:
            name: "{{ item }}"
            inventory: "{{ inventory_name }}"
            state: present
            controller_host: "https://{{ aap_gateway_ip }}"
            controller_username: "{{ aap_user }}"
            controller_password: "{{ aap_password }}"
            validate_certs: false
          loop: "{{ _missing_hosts }}"
          register: _add_results
          ignore_errors: true
          when: _missing_hosts | length > 0
          tags: execute

        # step-08: Evaluate host addition results (Req 9)
        - name: "Req 9 - Evaluate host addition results"
          ansible.builtin.set_fact:
            _added_hosts: "{{ _add_results.results | default([]) | rejectattr('failed') | map(attribute='item') | join(',') }}"
            _failed_hosts: "{{ _add_results.results | default([]) | selectattr('failed') | map(attribute='item') | join(',') }}"
            _all_succeeded: "{{ (_add_results.results | default([]) | selectattr('failed') | list | length) == 0 }}"
          tags: execute

        # Verification: ensure all desired hosts are present (minus failures)
        - name: "Verify - all desired hosts are present"
          block:
            - name: "Verify - Re-query current inventory hosts"
              ansible.builtin.set_fact:
                _current_hosts: >-
                  {{ query('ansible.controller.controller_api', 'hosts',
                         host='https://' ~ aap_gateway_ip,
                         username=aap_user,
                         password=aap_password,
                         verify_ssl=false,
                         query_params={'inventory': _inv_id},
                         return_all=true) | flatten | map(attribute='name') | list }}

            - name: "Verify - Assert no unexpected missing hosts"
              ansible.builtin.assert:
                that:
                  - (_hosts | difference(_current_hosts) | sort) == (_failed_hosts.split(',') | reject('equalto', '') | list | sort)
                fail_msg: "Verification failed: hosts missing after addition do not match failed list."
          tags: execute

        # step-09: Emit result block (Req 10)
        - name: "Req 10 - Emit result block"
          ansible.builtin.debug:
            msg: |
              <result>
              inventory_id: {{ _inv_id }}
              added_hosts: {{ _added_hosts }}
              failed_hosts: {{ _failed_hosts }}
              all_succeeded: {{ _all_succeeded }}
              </result>
          tags: execute

      rescue:
        - name: "Req 11 - Emit error block"
          ansible.builtin.debug:
            msg: |
              <result>
              ERROR: ensure_aap_inventory_with_hosts failed - {{ ansible_failed_task.name | default('unknown') }}: {{ ansible_failed_result.msg | default('unknown error') }}
              </result>
        - name: "Fail playbook after error"
          ansible.builtin.fail:
            msg: "ensure_aap_inventory_with_hosts failed"

      always:
        # ==================== RESTORE (tag: restore) ====================
        - name: "Restore - Read organization existence flag"
          ansible.builtin.slurp:
            src: "{{ backup_dir }}/org_exists.txt"
          register: _r_org_exists_raw
          tags: restore
          ignore_errors: true

        - name: "Restore - Set org existence fact"
          ansible.builtin.set_fact:
            _restore_org_existed: "{{ _r_org_exists_raw.content | b64decode | trim | bool }}"
          when: _r_org_exists_raw.content is defined
          tags: restore

        - name: "Restore - Delete organization if it was created by this run"
          ansible.controller.organization:
            name: "{{ organization_name }}"
            state: absent
            controller_host: "https://{{ aap_gateway_ip }}"
            controller_username: "{{ aap_user }}"
            controller_password: "{{ aap_password }}"
            validate_certs: false
          when: not _restore_org_existed
          tags: restore
          ignore_errors: true

        - name: "Restore - Read inventory existence flag"
          ansible.builtin.slurp:
            src: "{{ backup_dir }}/inv_exists.txt"
          register: _r_inv_exists_raw
          tags: restore
          ignore_errors: true

        - name: "Restore - Set inventory existence fact"
          ansible.builtin.set_fact:
            _restore_inv_existed: "{{ _r_inv_exists_raw.content | b64decode | trim | bool }}"
          when: _r_inv_exists_raw.content is defined
          tags: restore

        - name: "Restore - Delete inventory if created and org existed originally"
          ansible.controller.inventory:
            name: "{{ inventory_name }}"
            organization: "{{ organization_name }}"
            state: absent
            controller_host: "https://{{ aap_gateway_ip }}"
            controller_username: "{{ aap_user }}"
            controller_password: "{{ aap_password }}"
            validate_certs: false
          when: not _restore_inv_existed and _restore_org_existed
          tags: restore
          ignore_errors: true

        - name: "Restore - Restore original hosts if inventory existed originally"
          when: _restore_inv_existed | bool
          block:
            - name: "Restore - Read original hosts list"
              ansible.builtin.slurp:
                src: "{{ backup_dir }}/hosts_original.txt"
              register: _r_hosts_orig_raw
              ignore_errors: true

            - name: "Restore - Read inventory ID from backup"
              ansible.builtin.slurp:
                src: "{{ backup_dir }}/inv_id.txt"
              register: _r_inv_id_raw
              ignore_errors: true

            - name: "Restore - Gather current hosts"
              ansible.builtin.set_fact:
                _restore_current_hosts: >-
                  {{ query('ansible.controller.controller_api', 'hosts',
                         host='https://' ~ aap_gateway_ip,
                         username=aap_user,
                         password=aap_password,
                         verify_ssl=false,
                         query_params={'inventory': (_r_inv_id_raw.content | b64decode | trim | int)},
                         return_all=true) | flatten | map(attribute='name') | list }}
              when: _r_inv_id_raw.content is defined

            - name: "Restore - Compute hosts to remove (added by playbook)"
              ansible.builtin.set_fact:
                _restore_hosts_to_remove: >-
                  {%- set _orig = (_r_hosts_orig_raw.content | b64decode).split(',') | map('trim') | list -%}
                  {{ _restore_current_hosts | difference(_orig) }}

            - name: "Restore - Remove hosts that were added"
              ansible.controller.host:
                name: "{{ item }}"
                inventory: "{{ inventory_name }}"
                state: absent
                controller_host: "https://{{ aap_gateway_ip }}"
                controller_username: "{{ aap_user }}"
                controller_password: "{{ aap_password }}"
                validate_certs: false
              loop: "{{ _restore_hosts_to_remove }}"
              ignore_errors: true
          tags: restore