---
- name: SOP playbook 'ensure_aap_machine_credential' (ACTION — changes system state) - Ensure AAP Machine credential exists
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    aap_gateway_ip: ""
    aap_username: ""
    aap_password: ""
    organization_name: ""
    credential_name: ""
    user_name: ""
    user_password: ""
    ssh_private_key: ""
    sudo_password: ""
    credential_type: "Machine"
    aap_validate_certs: false
    playbook_name: "ensure_aap_machine_credential"
    backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"

  pre_tasks:
    - name: "Snapshot - Create backup directory"
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0700'
      tags: snapshot

    - name: "Snapshot - Check if credential exists in AAP"
      ansible.builtin.set_fact:
        _snap_credential_result: "{{ lookup('ansible.controller.controller_api', 'credentials',
                                 host=aap_gateway_ip,
                                 username=aap_username,
                                 password=aap_password,
                                 verify_ssl=aap_validate_certs,
                                 query_params={'name': credential_name, 'organization__name': organization_name},
                                 return_all=true) }}"
      tags: snapshot

    - name: "Snapshot - Record credential existence flag"
      ansible.builtin.copy:
        content: "{{ 'true' if (_snap_credential_result | length > 0) else 'false' }}"
        dest: "{{ backup_dir }}/cred_existed.flag"
      tags: snapshot

  tasks:
    - block:
        - name: "Validate required input variables"
          ansible.builtin.assert:
            that:
              - "aap_gateway_ip | length > 0"
              - "aap_username | length > 0"
              - "aap_password | length > 0"
              - "organization_name | length > 0"
              - "credential_name | length > 0"
              - "user_name | length > 0"
            fail_msg: "All required variables must be provided and not empty"
          tags: execute

        - name: "Step-01 - Prepare API auth variables"
          ansible.builtin.set_fact:
            _aap_host: "{{ aap_gateway_ip }}"
            _aap_user: "{{ aap_username }}"
            _aap_pass: "{{ aap_password }}"
          tags: execute

        - name: "Step-02 - Look up organization"
          ansible.builtin.set_fact:
            _org_result: >-
              {{ lookup('ansible.controller.controller_api', 'organizations',
                   host=_aap_host,
                   username=_aap_user,
                   password=_aap_pass,
                   verify_ssl=aap_validate_certs,
                   query_params={'name': organization_name},
                   return_all=true) }}
          tags: execute

        - name: "Step-02.1 - Normalize organization result to list"
          ansible.builtin.set_fact:
            _org_list: "{{ [_org_result] if _org_result is mapping else _org_result }}"
          tags: execute

        - name: "Organization exists branch"
          when: _org_list | default([]) | length > 0
          block:
            - name: "Step-04 - Extract organization ID"
              ansible.builtin.set_fact:
                _org_id: "{{ _org_list[0].id }}"
              tags: execute

            - name: "Step-05 - Look up credential"
              ansible.builtin.set_fact:
                _credential_result: >-
                  {{ lookup('ansible.controller.controller_api', 'credentials',
                       host=_aap_host,
                       username=_aap_user,
                       password=_aap_pass,
                       verify_ssl=aap_validate_certs,
                       query_params={'name': credential_name, 'organization__name': organization_name},
                       return_all=true) }}
              tags: execute

            - name: "Step-05.1 - Normalize credential result to list"
              ansible.builtin.set_fact:
                _credential_list: "{{ [_credential_result] if _credential_result is mapping else _credential_result }}"
              tags: execute

            - name: "Credential already exists branch"
              when: _credential_list | default([]) | length > 0
              block:
                - name: "Step-09 - Set credential-exists output vars"
                  ansible.builtin.set_fact:
                    _credential_name: "{{ credential_name }}"
                    _status: "already_exists"
                    _message: "Credential '{{ credential_name }}' already exists."
                    _credential_id: ""
                  tags: execute

            - name: "Credential does not exist branch"
              when: _credential_list | default([]) | length == 0
              block:
                - name: "Step-07 - Create Machine credential"
                  ansible.controller.credential:
                    name: "{{ credential_name }}"
                    organization: "{{ organization_name }}"
                    credential_type: "{{ credential_type }}"
                    inputs:
                      username: "{{ user_name }}"
                      password: "{{ user_password }}"
                      ssh_key_data: "{{ ssh_private_key }}"
                      become_password: "{{ sudo_password }}"
                    state: present
                    controller_host: "https://{{ _aap_host }}"
                    controller_username: "{{ _aap_user }}"
                    controller_password: "{{ _aap_pass }}"
                    validate_certs: "{{ aap_validate_certs }}"
                  register: _credential_creation_result
                  tags: execute

                - name: "Step-10 - Set credential-created output vars"
                  ansible.builtin.set_fact:
                    _credential_name: "{{ credential_name }}"
                    _status: "created"
                    _message: "Credential '{{ credential_name }}' created with ID {{ _credential_creation_result.id }}."
                    _credential_id: "{{ _credential_creation_result.id }}"
                  tags: execute

                - name: "Verify credential exists in the organization"
                  ansible.builtin.set_fact:
                    _verify_found: >-
                      {{ lookup('ansible.controller.controller_api', 'credentials',
                           host=_aap_host,
                           username=_aap_user,
                           password=_aap_pass,
                           verify_ssl=aap_validate_certs,
                           query_params={'name': credential_name, 'organization__name': organization_name},
                           return_all=true) }}
                  tags: execute

                - name: "Verify - Normalize verify result to list"
                  ansible.builtin.set_fact:
                    _verify_list: "{{ [_verify_found] if _verify_found is mapping else _verify_found }}"
                  tags: execute

                - name: "Set verification results"
                  ansible.builtin.set_fact:
                    _credential_exists: "{{ _verify_list | length > 0 }}"
                    _credential_id: "{{ (_verify_list | first).id if _verify_list else '' }}"
                    _credential_name: "{{ (_verify_list | first).name if _verify_list else '' }}"
                  tags: execute

                - name: "Assert credential found after processing"
                  ansible.builtin.assert:
                    that: "_credential_exists | bool"
                  tags: execute

        - name: "Organization absent branch"
          when: _org_list | default([]) | length == 0
          block:
            - name: "Step-08 - Set organization-absent output vars"
              ansible.builtin.set_fact:
                _credential_name: "{{ credential_name }}"
                _status: "organization_missing"
                _message: "Organization '{{ organization_name }}' does not exist in AAP."
                _credential_id: ""
              tags: execute

        - name: "Step-11 - Emit result block"
          ansible.builtin.debug:
            msg: |
              <result>
              credential_name: {{ _credential_name }}
              status: {{ _status }}
              message: {{ _message }}
              credential_id: {{ _credential_id }}
              </result>
          tags: execute

      rescue:
        - name: "Capture error details on task failure"
          ansible.builtin.set_fact:
            error_host: "{{ ansible_play_hosts[0] }}"
            error_reason: "{{ ansible_failed_task.name | default('Unknown') }} - {{ ansible_failed_result.msg | default('An unexpected error occurred during playbook execution.') }} {{ ansible_failed_result.stderr | default('') }}"
          failed_when: false

        - name: "Step-12 - Emit generic error and fail"
          ansible.builtin.debug:
            msg: |
              <result>
              ERROR: {{ error_host }} - {{ error_reason }}
              </result>
          failed_when: false

      always:
        - name: "Restore - Check if credential existence flag exists"
          ansible.builtin.stat:
            path: "{{ backup_dir }}/cred_existed.flag"
          register: flag_stat
          tags: restore

        - name: "Restore - Read credential existence flag"
          ansible.builtin.slurp:
            src: "{{ backup_dir }}/cred_existed.flag"
          register: flag_content
          when: flag_stat.stat.exists
          tags: restore

        - name: "Restore - Delete credential if it was created by this playbook"
          ansible.controller.credential:
            name: "{{ credential_name }}"
            organization: "{{ organization_name }}"
            credential_type: "{{ credential_type }}"
            state: absent
            controller_host: "https://{{ aap_gateway_ip }}"
            controller_username: "{{ aap_username }}"
            controller_password: "{{ aap_password }}"
            validate_certs: "{{ aap_validate_certs }}"
          when:
            - flag_stat.stat.exists
            - (flag_content.content | b64decode | trim) == 'false'
          tags: restore

        - name: "Restore - Remove backup directory"
          ansible.builtin.file:
            path: "{{ backup_dir }}"
            state: absent
          tags: restore
          ignore_errors: true